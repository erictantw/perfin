<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wealthfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;450;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        stone: {
          50:  '#fafaf9', 100: '#f5f5f4', 200: '#e7e5e4',
          300: '#d6d3d1', 400: '#a8a29e', 500: '#78716c',
          600: '#57534e', 700: '#44403c', 800: '#292524',
          900: '#1c1917', 950: '#0c0a09',
        }
      }
    }
  }
};
</script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    background: #1a1714;
    color: #e8ddd0;
    font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-weight: 400;
    margin: 0;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .font-serif { font-family: 'Lora', Georgia, 'Times New Roman', serif; }
  h1, h2.serif { font-family: 'Lora', Georgia, serif; font-weight: 400; }
  /* Page headings use serif */
  .page-title { font-family: 'Lora', Georgia, serif; font-weight: 400; font-size: 1.6rem; letter-spacing: -0.01em; color: #f5f0ea; }
  .net-worth-num { font-family: 'Lora', Georgia, serif; font-weight: 400; letter-spacing: -0.02em; }
  .section-label { font-family: 'Inter', sans-serif; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #6b6057; }
  .onboarding-step-num { font-family: 'Lora', Georgia, serif; font-style: italic; font-size: 1.1rem; color: #6b6057; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: #1a1714; }
  ::-webkit-scrollbar-thumb { background: #292524; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #44403c; }

  /* Utility classes used by components */
  .card {
    background: #1c1917;
    border: 1px solid #292524;
    border-radius: 1rem;
    padding: 1.25rem;
  }
  .btn-primary {
    background: #059669;
    color: #fff;
    font-weight: 600;
    font-size: 0.75rem;
    padding: 0.4rem 0.85rem;
    border-radius: 0.5rem;
    border: none;
    cursor: pointer;
    transition: background 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
  }
  .btn-primary:hover { background: #10b981; }
  .btn-secondary {
    background: transparent;
    color: #a8a29e;
    font-weight: 500;
    font-size: 0.75rem;
    padding: 0.4rem 0.85rem;
    border-radius: 0.5rem;
    border: 1px solid #44403c;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
  }
  .btn-secondary:hover { color: #e8ddd0; border-color: #78716c; }
  .input {
    background: #0c0a09;
    border: 1px solid #44403c;
    border-radius: 0.5rem;
    padding: 0.45rem 0.75rem;
    color: #e8ddd0;
    font-size: 0.875rem;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  .input:focus { border-color: rgba(16,185,129,0.5); box-shadow: 0 0 0 2px rgba(16,185,129,0.08); }
  .input::placeholder { color: #57534e; }
  select.input { cursor: pointer; }
  input[type="range"] { cursor: pointer; }

  /* Nav active link */
  .nav-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.75rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 500; color: #78716c; transition: all 0.15s; cursor: pointer; text-decoration: none; border: none; background: none; width: 100%; }
  .nav-link:hover { color: #e8ddd0; background: #292524; }
  .nav-link.active { color: #10b981; background: rgba(16,185,129,0.1); }

  @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
  .net-worth-glow-card {
    position: relative;
    border-radius: 16px;
  }
  .net-worth-glow-ring {
    position: absolute;
    inset: -2px;
    border-radius: 18px;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .net-worth-glow-ring canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .page-enter { animation: fadeIn 0.2s ease; }
</style>
</head>
<body>
<div id="root"></div>

<script src="lib.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="pages-overview.jsx"></script>
<script type="text/babel" src="pages-cpf.jsx"></script>
<script type="text/babel" src="pages-srs.jsx"></script>
<script type="text/babel" src="pages-investments.jsx"></script>
<script type="text/babel" src="pages-loans.jsx"></script>
<script type="text/babel" src="pages-plan.jsx"></script>
<script type="text/babel" src="pages-dividends.jsx"></script>
<script type="text/babel" src="pages-history.jsx"></script>

<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#10b981",
  "userName": "Alex",
  "currency": "SGD",
  "compactNumbers": true,
  "showAllocationBar": true
}/*EDITMODE-END*/;

// ─── Nav config ───────────────────────────────────────────────────────────────
const NAV_ITEMS = [
{ id: 'overview', label: 'Overview', icon:
  <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.75" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" /><rect x="14" y="3" width="7" height="7" rx="1" /><rect x="3" y="14" width="7" height="7" rx="1" /><rect x="14" y="14" width="7" height="7" rx="1" /></svg>
},
{ id: 'cpf', label: 'CPF & SRS', icon:
  <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.75" viewBox="0 0 24 24"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" /></svg>
},
{ id: 'investments', label: 'Investments', icon:
  <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.75" viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17" /><polyline points="16 7 22 7 22 13" /></svg>
},
{ id: 'plan', label: 'Plan', icon:
  <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.75" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /><path d="M12 8v4l3 3" /></svg>
},
{ id: 'loans', label: 'Loans', icon:
  <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.75" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" /><line x1="1" y1="10" x2="23" y2="10" /></svg>
},
{ id: 'dividends', label: 'Dividends', icon:
  <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.75" viewBox="0 0 24 24"><polyline points="20 12 20 22 4 22 4 12" /><rect x="2" y="7" width="20" height="5" /><line x1="12" y1="22" x2="12" y2="7" /><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z" /><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z" /></svg>
},
{ id: 'history', label: 'History', icon:
  <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.75" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></svg>
}];


const PAGE_COMPONENTS = {
  overview: OverviewPage,
  cpf: CPFPage,
  investments: InvestmentsPage,
  plan: PlanPage,
  loans: LoansPage,
  dividends: DividendsPage,
  history: HistoryPage
};

// ─── App Shell ────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = React.useState(() => localStorage.getItem('wf_page') || 'overview');
  const [sidebarOpen, setSidebarOpen] = React.useState(false);
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const tweaks = t ?? TWEAK_DEFAULTS;

  function navigate(id) {
    setPage(id);
    localStorage.setItem('wf_page', id);
    setSidebarOpen(false);
    document.documentElement.style.setProperty('--accent', tweaks.accentColor);
  }

  // Expose navigate globally for onboarding step buttons
  React.useEffect(() => {window.__navigateTo = navigate;}, []);
  React.useEffect(() => {window.__userName = tweaks.userName || 'Alex';}, [tweaks.userName]);

  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accentColor);
    // Apply accent to btn-primary via style tag
    let st = document.getElementById('accent-override');
    if (!st) {st = document.createElement('style');st.id = 'accent-override';document.head.appendChild(st);}
    st.textContent = `.btn-primary { background: ${tweaks.accentColor} !important; } .btn-primary:hover { filter: brightness(1.1); } .nav-link.active { color: ${tweaks.accentColor} !important; background: ${tweaks.accentColor}18 !important; }`;
  }, [tweaks.accentColor]);

  const PageComp = PAGE_COMPONENTS[page] || OverviewPage;

  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(() => localStorage.getItem('wf_sidebar_collapsed') === 'true');

  function toggleSidebar() {
    const next = !sidebarCollapsed;
    setSidebarCollapsed(next);
    localStorage.setItem('wf_sidebar_collapsed', String(next));
  }

  const SidebarInner = () =>
  <div className="flex flex-col h-full" style={{ background: '#161412', borderRight: '1px solid #292524', width: sidebarCollapsed ? 56 : 240, transition: 'width 0.22s cubic-bezier(0.4,0,0.2,1)', overflow: 'hidden' }}>
      {/* Logo */}
      <div className="px-3 py-5 border-b border-stone-800 flex items-center justify-between" style={{ minHeight: 64 }}>
        {!sidebarCollapsed && <div>
          <p style={{ fontFamily: "'Lora', Georgia, serif", fontWeight: 500, fontSize: '1rem', color: '#e8ddd0', letterSpacing: '-0.01em', lineHeight: 1 }}>Wealthfolio</p>
          <p className="text-[10px] tracking-[0.12em] uppercase text-stone-600 mt-1" style={{ fontFamily: 'Inter, sans-serif' }}>Personal Finance</p>
        </div>}
        <button onClick={toggleSidebar} className="lg:flex hidden p-1.5 rounded-lg text-stone-500 hover:text-stone-100 hover:bg-stone-800 transition-colors flex-shrink-0" style={{ marginLeft: sidebarCollapsed ? 'auto' : 0, marginRight: sidebarCollapsed ? 'auto' : 0 }}>
          <svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
            {sidebarCollapsed
              ? <><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></>
              : <><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></>
            }
          </svg>
        </button>
        <button onClick={() => setSidebarOpen(false)} className="lg:hidden p-1 text-stone-500 hover:text-stone-100">
          <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
        </button>
      </div>

      {/* Nav */}
      <nav className="flex-1 py-4 px-2 space-y-0.5 overflow-y-auto" data-comment-anchor="0756bdabe7-nav-86-7">
        {NAV_ITEMS.map(({ id, label, icon }) =>
      <button key={id} onClick={() => navigate(id)} title={sidebarCollapsed ? label : undefined}
      className={`nav-link ${page === id ? 'active' : ''}`} style={{ justifyContent: sidebarCollapsed ? 'center' : 'flex-start', padding: sidebarCollapsed ? '0.5rem' : '0.5rem 0.75rem' }}>
            <span className="flex-shrink-0">{icon}</span>
            {!sidebarCollapsed && <span>{label}</span>}
          </button>
      )}
      </nav>

      {/* Profile footer */}
      {!sidebarCollapsed && <div className="p-4 border-t border-stone-800">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold text-stone-900 flex-shrink-0" style={{ background: tweaks.accentColor }}>
            {(tweaks.userName || 'A')[0].toUpperCase()}
          </div>
          <div className="min-w-0">
            <p className="text-sm font-semibold text-stone-200 truncate">{tweaks.userName || 'Alex'}</p>
            <p className="text-xs text-stone-600">Personal</p>
          </div>
        </div>
      </div>}
      {sidebarCollapsed && <div className="p-3 border-t border-stone-800 flex justify-center">
        <div className="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold text-stone-900 flex-shrink-0" style={{ background: tweaks.accentColor }}>
          {(tweaks.userName || 'A')[0].toUpperCase()}
        </div>
      </div>}
    </div>;


  return (
    <div className="min-h-screen flex" style={{ background: '#1a1714' }}>
      {/* Desktop sidebar */}
      <div className="hidden lg:flex flex-shrink-0 h-screen sticky top-0">
        <SidebarInner />
      </div>

      {/* Mobile sidebar overlay */}
      {sidebarOpen &&
      <div className="fixed inset-0 z-50 flex lg:hidden">
          <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={() => setSidebarOpen(false)} />
          <div className="relative z-10 h-full"><SidebarInner /></div>
        </div>
      }

      {/* Main content */}
      <div className="flex-1 flex flex-col min-w-0 min-h-screen">
        {/* Mobile header */}
        <div className="lg:hidden flex items-center gap-3 px-4 py-3 border-b border-stone-800 sticky top-0 z-30" style={{ background: '#161412' }}>
          <button onClick={() => setSidebarOpen(true)} className="p-1.5 rounded-lg text-stone-400 hover:text-stone-100 hover:bg-stone-800 transition-colors">
            <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" /></svg>
          </button>
          <p style={{ fontFamily: "'Lora', Georgia, serif", fontWeight: 500, fontSize: '1rem', color: '#e8ddd0' }}>Wealthfolio</p>
          <div className="flex-1" />
          <p className="text-xs text-stone-500">{NAV_ITEMS.find((n) => n.id === page)?.label}</p>
        </div>

        {/* Page */}
        <main className="flex-1 p-4 sm:p-6 lg:p-8 max-w-5xl w-full mx-auto">
          <div key={page} className="page-enter">
            <PageComp />
          </div>
          {/* Footer */}
          <footer className="mt-10 pt-5 border-t border-stone-800/60">
            <p className="text-xs text-stone-700">Data stored locally in your browser. Not financial advice.</p>
            <p className="text-xs text-stone-700 mt-0.5">Wealthfolio · v1.0.0</p>
          </footer>
        </main>
      </div>

      {/* Tweaks Panel */}
      <TweaksPanel>
        <TweakSection label="Appearance" />
        <TweakColor label="Accent colour" value={tweaks.accentColor}
        options={['#10b981', '#3b82f6', '#8b5cf6', '#f59e0b', '#ef4444']}
        onChange={(v) => setTweak('accentColor', v)} />
        <TweakSection label="Profile" />
        <TweakText label="Your name" value={tweaks.userName}
        onChange={(v) => setTweak('userName', v)} />
        <TweakSection label="Display" />
        <TweakToggle label="Compact numbers" value={tweaks.compactNumbers}
        onChange={(v) => setTweak('compactNumbers', v)} />
        <TweakToggle label="Show allocation bar" value={tweaks.showAllocationBar}
        onChange={(v) => setTweak('showAllocationBar', v)} />
      </TweaksPanel>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
