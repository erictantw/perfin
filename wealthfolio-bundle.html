<script>

// ─── Formatters ───────────────────────────────────────────────────────────────
window.fmtSGD = function(value, compact = false) {
  if (value == null || isNaN(value)) return '—';
  const abs = Math.abs(value);
  let formatted;
  if (compact && abs >= 1_000_000) formatted = (abs / 1_000_000).toFixed(2) + 'M';
  else if (compact && abs >= 1_000) formatted = (abs / 1_000).toFixed(1) + 'k';
  else formatted = abs.toLocaleString('en-SG', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  return (value < 0 ? '–S$' : 'S$') + formatted;
};

window.fmtNum = function(value, decimals = 2) {
  if (value == null || isNaN(value)) return '—';
  return Number(value).toLocaleString('en-SG', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
};

window.fmtPct = function(value, decimals = 1) {
  if (value == null || isNaN(value)) return '—';
  return `${value > 0 ? '+' : ''}${value.toFixed(decimals)}%`;
};

window.greet = function() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
};

window.todayLong = function() {
  return new Date().toLocaleDateString('en-SG', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
};

window.isoDate = function(date = new Date()) {
  return date.toISOString().split('T')[0];
};

// ─── LocalStorage DB ─────────────────────────────────────────────────────────
window.db = {
  get(key, def = []) {
    try { return JSON.parse(localStorage.getItem('wf_' + key)) ?? def; } catch { return def; }
  },
  set(key, value) {
    localStorage.setItem('wf_' + key, JSON.stringify(value));
  },
  nextId(key) {
    const items = this.get(key, []);
    return items.length ? Math.max(...items.map(i => i.id || 0)) + 1 : 1;
  }
};

// ─── Calculations ─────────────────────────────────────────────────────────────
window.CPF_RATES = { OA: 0.025, SA: 0.04, MA: 0.04, RA: 0.04 };

window.projectCpfGrowth = function(oa, sa, ma, years = 30) {
  const result = [{ year: 0, oa, sa, ma, total: oa + sa + ma }];
  let curOA = oa, curSA = sa, curMA = ma;
  for (let y = 1; y <= years; y++) {
    curOA = curOA * (1 + CPF_RATES.OA);
    curSA = curSA * (1 + CPF_RATES.SA);
    curMA = curMA * (1 + CPF_RATES.MA);
    result.push({ year: y, oa: Math.round(curOA), sa: Math.round(curSA), ma: Math.round(curMA), total: Math.round(curOA + curSA + curMA) });
  }
  return result;
};

window.FRS_2024 = 205800;
window.frsAtAge = function(currentAge, targetAge = 55, frs = FRS_2024) {
  return Math.round(frs * Math.pow(1.035, Math.max(0, targetAge - currentAge)));
};

window.calcMonthlyRepayment = function(principal, annualRate, tenureMonths) {
  if (!principal || !tenureMonths) return 0;
  if (!annualRate || annualRate === 0) return principal / tenureMonths;
  const r = annualRate / 12;
  return (principal * r * Math.pow(1 + r, tenureMonths)) / (Math.pow(1 + r, tenureMonths) - 1);
};

window.calcMortgageSchedule = function(principal, annualRate, tenureMonths) {
  const monthly = calcMonthlyRepayment(principal, annualRate, tenureMonths);
  const r = (annualRate || 0) / 12;
  const schedule = [];
  let balance = principal;
  for (let m = 1; m <= tenureMonths; m++) {
    const interest = balance * r;
    const principalPaid = monthly - interest;
    balance = Math.max(0, balance - principalPaid);
    schedule.push({ month: m, payment: Math.round(monthly * 100) / 100, principal: Math.round(principalPaid * 100) / 100, interest: Math.round(interest * 100) / 100, balance: Math.round(balance * 100) / 100 });
    if (balance <= 0) break;
  }
  return schedule;
};

window.calcAllocationGaps = function(actual, targets) {
  const totalActual = Object.values(actual).reduce((s, v) => s + (v || 0), 0);
  return Object.keys(targets).map(key => {
    const actualAmt = actual[key] || 0;
    const actualPct = totalActual ? (actualAmt / totalActual) * 100 : 0;
    const targetPct = targets[key] || 0;
    return { key, actualAmt, actualPct: Math.round(actualPct * 10) / 10, targetPct, gap: Math.round((actualPct - targetPct) * 10) / 10 };
  });
};

window.calcRunRate = function(dividends) {
  if (!dividends?.length) return 0;
  const now = new Date();
  const cutoff = new Date(now); cutoff.setFullYear(cutoff.getFullYear() - 1);
  return dividends.filter(d => { const dt = new Date(d.ex_date); return dt >= cutoff && dt <= now; }).reduce((s, d) => s + (d.amount || 0), 0);
};

window.buildDividendMonthlyData = function(dividends) {
  const months = [];
  const now = new Date();
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({ label: d.toLocaleString('default', { month: 'short', year: '2-digit' }), year: d.getFullYear(), month: d.getMonth() + 1, total: 0 });
  }
  for (const div of dividends) {
    const dt = new Date(div.ex_date);
    const entry = months.find(m => m.year === dt.getFullYear() && m.month === dt.getMonth() + 1);
    if (entry) entry.total += div.amount || 0;
  }
  return months;
};

window.buildNetWorthHistory = function(snapshots) {
  return (snapshots || []).sort((a, b) => new Date(a.snapshot_date) - new Date(b.snapshot_date)).map(s => ({
    date: s.snapshot_date, netWorth: s.net_worth, cash: s.cash, investments: s.investments, cpf: s.cpf
  }));
};

window.buildActivityHeatmap = function(transactions) {
  const map = {};
  for (const tx of transactions || []) {
    const day = tx.date?.slice(0, 10);
    if (!day) continue;
    if (!map[day]) map[day] = { count: 0, amount: 0 };
    map[day].count++;
    map[day].amount += Math.abs(tx.amount || 0);
  }
  const days = [];
  const now = new Date();
  for (let i = 364; i >= 0; i--) {
    const d = new Date(now); d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    days.push({ date: key, ...(map[key] || { count: 0, amount: 0 }) });
  }
  return days;
};

    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel">

// ─── Shared UI Components ─────────────────────────────────────────────────────

// StatCard
function StatCard({ title, value, subValue, icon: Icon, trend, className = '', onClick, loading = false }) {
  const pos = trend > 0, neg = trend < 0;
  return (
    <div onClick={onClick} className={`card ${onClick ? 'cursor-pointer hover:border-stone-600 transition-colors' : ''} ${className}`}>
      <div className="flex items-start justify-between gap-2">
        <p className="text-xs font-medium text-stone-400 uppercase tracking-wide">{title}</p>
        {Icon && <div className="p-1.5 rounded-lg bg-stone-800/60 text-stone-400 flex-shrink-0"><Icon size={14} /></div>}
      </div>
      {loading ? (
        <div className="mt-2 space-y-2">
          <div className="h-7 w-32 bg-stone-800 rounded animate-pulse" />
          <div className="h-4 w-20 bg-stone-800 rounded animate-pulse" />
        </div>
      ) : (
        <div className="mt-2">
          <p className="text-2xl font-bold text-stone-50 tracking-tight">{value}</p>
          {(trend !== undefined && trend !== null || subValue) && (
            <div className="flex items-center gap-2 mt-1">
              {trend !== undefined && trend !== null && (
                <span className={`text-xs font-medium ${pos ? 'text-emerald-400' : neg ? 'text-red-400' : 'text-stone-400'}`}>
                  {pos ? '▲' : neg ? '▼' : '–'} {Math.abs(trend).toFixed(1)}%
                </span>
              )}
              {subValue && <span className="text-xs text-stone-400">{subValue}</span>}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// Modal
function Modal({ open, onClose, title, children, size = 'md' }) {
  React.useEffect(() => {
    if (!open) return;
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [open, onClose]);

  if (!open) return null;
  const maxW = { sm: 'max-w-sm', md: 'max-w-lg', lg: 'max-w-2xl', xl: 'max-w-4xl' }[size] ?? 'max-w-lg';
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
      <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={onClose} />
      <div className={`relative z-10 w-full ${maxW} bg-stone-900 rounded-2xl border border-stone-700 shadow-2xl flex flex-col max-h-[90vh]`}>
        <div className="flex items-center justify-between px-5 py-4 border-b border-stone-700/60 flex-shrink-0">
          <h2 className="text-base font-semibold text-stone-50">{title}</h2>
          <button onClick={onClose} className="p-1 rounded text-stone-400 hover:text-stone-100 transition-colors">
            <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div className="overflow-y-auto flex-1 px-5 py-4">{children}</div>
      </div>
    </div>
  );
}

// EmptyState
function EmptyState({ icon: Icon, title, description, action, onAction }) {
  return (
    <div className="flex flex-col items-center justify-center py-12 text-center px-6">
      {Icon && <div className="p-3 rounded-2xl bg-stone-800 text-stone-500 mb-3"><Icon size={24} /></div>}
      <p className="text-sm font-semibold text-stone-300 mb-1">{title}</p>
      <p className="text-xs text-stone-500 mb-4">{description}</p>
      {action && (
        <button onClick={onAction} className="btn-primary text-xs px-4 py-2">{action}</button>
      )}
    </div>
  );
}

// Input / Select helpers
function Field({ label, children }) {
  return (
    <div>
      <label className="block text-xs font-medium text-stone-400 mb-1">{label}</label>
      {children}
    </div>
  );
}

function Input(props) {
  return <input {...props} className={`input ${props.className || ''}`} />;
}

function Select({ children, ...props }) {
  return <select {...props} className={`input ${props.className || ''}`}>{children}</select>;
}

// AllocationBar
function AllocationBar({ label, actualPct, targetPct, gap, color }) {
  return (
    <div>
      <div className="flex items-center justify-between text-xs mb-1.5">
        <span className={`font-medium ${color}`}>{label}</span>
        <div className="flex items-center gap-3 text-stone-400">
          <span className={`font-semibold ${gap >= 0 ? 'text-emerald-400' : 'text-amber-400'}`}>
            {actualPct.toFixed(1)}%
          </span>
          <span className="text-stone-600">target {targetPct}%</span>
          <span className={`text-xs font-medium ${gap >= 0 ? 'text-emerald-500' : 'text-amber-500'}`}>
            {gap > 0 ? `+${gap}%` : gap < 0 ? `${gap}%` : '✓'}
          </span>

function GlowRing() {
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const angleRef = React.useRef(0);

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const r = 18; // border-radius

    function draw() {
      const w = canvas.offsetWidth;
      const h = canvas.offsetHeight;
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
      }
      ctx.clearRect(0, 0, w, h);

      const cx = w / 2, cy = h / 2;
      const angle = angleRef.current;

      // Perimeter path for clipping
      const path = new Path2D();
      path.moveTo(r, 0);
      path.lineTo(w - r, 0);
      path.arcTo(w, 0, w, r, r);
      path.lineTo(w, h - r);
      path.arcTo(w, h, w - r, h, r);
      path.lineTo(r, h);
      path.arcTo(0, h, 0, h - r, r);
      path.lineTo(0, r);
      path.arcTo(0, 0, r, 0, r);
      path.closePath();

      // Inner path (cutout — 2px inset)
      const inset = 2;
      const ir = Math.max(r - inset, 0);
      const innerPath = new Path2D();
      innerPath.moveTo(inset + ir, inset);
      innerPath.lineTo(w - inset - ir, inset);
      innerPath.arcTo(w - inset, inset, w - inset, inset + ir, ir);
      innerPath.lineTo(w - inset, h - inset - ir);
      innerPath.arcTo(w - inset, h - inset, w - inset - ir, h - inset, ir);
      innerPath.lineTo(inset + ir, h - inset);
      innerPath.arcTo(inset, h - inset, inset, h - inset - ir, ir);
      innerPath.lineTo(inset, inset + ir);
      innerPath.arcTo(inset, inset, inset + ir, inset, ir);
      innerPath.closePath();

      // Draw outer glow bloom first (blurred)
      ctx.save();
      ctx.filter = 'blur(6px)';
      const glowGrad = ctx.createConicalGradient
        ? ctx.createConicalGradient(angle, cx, cy)
        : null;

      // Fallback: use arc-based approach
      // Compute the spot position on perimeter
      const spotAngle = angle;
      const spotX = cx + Math.cos(spotAngle) * (w * 0.52);
      const spotY = cy + Math.sin(spotAngle) * (h * 0.52);

      // Outer glow
      const radGlow = ctx.createRadialGradient(spotX, spotY, 0, spotX, spotY, w * 0.35);
      radGlow.addColorStop(0, 'rgba(220,230,225,0.2)');
      radGlow.addColorStop(0.5, 'rgba(200,215,210,0.05)');
      radGlow.addColorStop(1, 'rgba(200,215,210,0)');
      ctx.fillStyle = radGlow;
      ctx.fillRect(0, 0, w, h);
      ctx.restore();

      // Draw border strip with spot light
      ctx.save();
      ctx.clip(path, 'evenodd');
      // Fill entire border strip with dark base
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.fill(path);
      // Cut out inner
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = 'rgba(0,0,0,1)';
      ctx.fill(innerPath);
      ctx.globalCompositeOperation = 'source-over';

      // Bright spot travelling along border
      const spotRad = ctx.createRadialGradient(spotX, spotY, 0, spotX, spotY, 120);
      spotRad.addColorStop(0, 'rgba(255,255,255,0.95)');
      spotRad.addColorStop(0.2, 'rgba(220,230,225,0.7)');
      spotRad.addColorStop(0.5, 'rgba(180,200,195,0.2)');
      spotRad.addColorStop(1, 'rgba(180,200,195,0)');
      ctx.fillStyle = spotRad;
      ctx.fill(path);
      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = 'rgba(0,0,0,1)';
      ctx.fill(innerPath);
      ctx.restore();

      angleRef.current = (angle + 0.004) % (Math.PI * 2);
      rafRef.current = requestAnimationFrame(draw);
    }

    draw();
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, []);

  return (
    <div className="net-worth-glow-ring" style={{ position:'absolute', inset:-2, borderRadius:18, pointerEvents:'none', zIndex:0, overflow:'hidden' }}>
      <canvas ref={canvasRef} style={{ position:'absolute', inset:0, width:'100%', height:'100%', display:'block' }} />
    </div>
  );
}

// CPF color tokens
const CPF_COLORS = {
  oa: '#5890c0', // blue
  sa: '#d4a052', // amber
  ma: '#3aaa8a', // teal
  ra: '#9b7fd4', // purple
  srs: '#e8844a' // orange
};

// CPF contribution rates by age (employee + employer combined)
function cpfContribRates(age) {
  if (age <= 35) return { total: 0.37, oa: 0.6216, sa: 0.1622, ma: 0.2162 };
  if (age <= 45) return { total: 0.37, oa: 0.5676, sa: 0.1892, ma: 0.2432 };
  if (age <= 50) return { total: 0.37, oa: 0.5135, sa: 0.2162, ma: 0.2703 };
  if (age <= 55) return { total: 0.37, oa: 0.4054, sa: 0.3243, ma: 0.2703 };
  if (age <= 60) return { total: 0.26, oa: 0.3846, sa: 0.2692, ma: 0.3462 };
  if (age <= 65) return { total: 0.165, oa: 0.2424, sa: 0.2121, ma: 0.5455 };
  return { total: 0.125, oa: 0.08, sa: 0, ma: 0.92 };
}

const SALARY_CAP = 8000; // CPF OW ceiling (2026)

function calcMonthlyContribs(salary, age) {
  const capped = Math.min(salary, SALARY_CAP);
  const rates = cpfContribRates(age);
  const total = capped * rates.total;
  return {
    total: Math.round(total),
    oa: Math.round(total * rates.oa),
    sa: Math.round(total * rates.sa),
    ma: Math.round(total * rates.ma)
  };
}

// Projected balances year by year including monthly contributions
function projectCpfFull(oa, sa, ma, salary, currentAge, projAge = 55, annualTopUp = 0) {
  const years = projAge - currentAge;
  const result = [{ age: currentAge, oa, sa, ma, total: oa + sa + ma }];
  let curOA = oa,curSA = sa,curMA = ma;
  for (let y = 1; y <= years; y++) {
    const age = currentAge + y;
    const c = calcMonthlyContribs(salary, age - 1);
    curOA += c.oa * 12;
    curSA += c.sa * 12 + annualTopUp;
    curMA += c.ma * 12;
    curOA = curOA * (1 + CPF_RATES.OA);
    curSA = curSA * (1 + CPF_RATES.SA);
    curMA = curMA * (1 + CPF_RATES.MA);
    result.push({ age, oa: Math.round(curOA), sa: Math.round(curSA), ma: Math.round(curMA), total: Math.round(curOA + curSA + curMA) });
  }
  return result;
}

// CPF LIFE monthly payout estimate (rough)
function estimateCpfLife(saAt55) {
  const basic = saAt55 * 0.0064;
  const standard = saAt55 * 0.0082;
  const escalating = saAt55 * 0.0066;
  return {
    basic: [Math.round(basic * 0.98), Math.round(basic * 1.01)],
    standard: [Math.round(standard * 0.98), Math.round(standard * 1.02)],
    escalating: [Math.round(escalating * 0.98), Math.round(escalating * 1.02)]
  };
}

}

function CPFPage() {
  const [tab, setTab] = React.useState('cpf'); // 'cpf' | 'srs'

  // CPF data
  const cpfData = db.get('cpf', { oa: 0, sa: 0, ma: 0, ra: 0, srs: 0 });
  const [form, setForm] = React.useState({ oa: cpfData.oa || '', sa: cpfData.sa || '', ma: cpfData.ma || '', ra: cpfData.ra || '', srs: cpfData.srs || '' });

  // Settings
  const settings = db.get('cpf_settings', { salary: 7500, age: 29, retirementYear: 2051 });

    housingCPF: settings.housingCPF || '',
    loanTenure: settings.loanTenure || '',
    annualTopUp: settings.annualTopUp || '',
    dob: settings.dob || ''
  });

  const { oa = 0, sa = 0, ma = 0, ra = 0, srs = 0 } = cpfData;
  const total = oa + sa + ma + ra;
  const oaPct = total ? oa / total * 100 : 0;
  const saPct = total ? sa / total * 100 : 0;
  const maPct = total ? ma / total * 100 : 0;

  // Scenario sliders
  const [projAge, setProjAge] = React.useState(55);
  const [topUp, setTopUp] = React.useState(0);

  // Use live settingsForm values so Monthly Contributions syncs with drawer inputs
  const currentAge = settingsForm.dob ?

  parseInt(settingsForm.age) || settings.age || 29;
  const salary = parseFloat(settingsForm.salary) || settings.salary || 7500;

  // Project growth
  const projection = projectCpfFull(oa, sa, ma, salary, currentAge, Math.max(projAge, currentAge + 1), topUp);
  const at55 = projection.find((p) => p.age === 55) || projection[projection.length - 1];
  const saAt55 = at55?.sa || 0;
  const oaAt55 = at55?.oa || 0;
  const totalAt55 = saAt55 + oaAt55;

  // FRS targets
  const frs2026 = 213000;
  const brs = Math.round(frs2026 * 0.5);
  const frs = frs2026;
  const ers = Math.round(frs2026 * 1.5);

  // Monthly contributions
  const contribs = calcMonthlyContribs(salary, currentAge);

  // CPF LIFE estimates
  const life = estimateCpfLife(saAt55);

  // FRS tracking: when will SA hit FRS?
  const frsHitAge = (() => {
    for (const p of projection) {
      if (p.sa >= frs) return p.age;
    }
    return null;
  })();

  function handleSave(e) {
    e.preventDefault();
    db.set('cpf', { oa: parseFloat(form.oa) || 0, sa: parseFloat(form.sa) || 0, ma: parseFloat(form.ma) || 0, ra: parseFloat(form.ra) || 0, srs: parseFloat(form.srs) || 0 });
    setShowModal(false);
    refresh();
  }

  function handleSettingsSave(e) {
    if (e && e.preventDefault) e.preventDefault();
    // Save CPF balances too
    db.set('cpf', {
      oa: parseFloat(settingsForm.oa ?? form.oa) || 0,
      sa: parseFloat(settingsForm.sa ?? form.sa) || 0,
      ma: parseFloat(settingsForm.ma ?? form.ma) || 0,
      ra: parseFloat(settingsForm.ra ?? form.ra) || 0,
      srs: parseFloat(form.srs) || 0
    });
    db.set('cpf_settings', {
      salary: parseFloat(settingsForm.salary) || 7500,
      age: settingsForm.dob ?
      new Date().getFullYear() - new Date(settingsForm.dob).getFullYear() :
      parseInt(settingsForm.age) || 29,
      retirementYear: parseInt(settingsForm.retirementYear) || 2051,
      dob: settingsForm.dob || '',
      autoUpdate: settingsForm.autoUpdate || false,
      housingCPF: parseFloat(settingsForm.housingCPF) || 0,
      loanTenure: parseInt(settingsForm.loanTenure) || 0,
      annualTopUp: parseFloat(settingsForm.annualTopUp) || 0
    });
    if (settingsForm.annualTopUp) setTopUp(parseFloat(settingsForm.annualTopUp) || 0);

  // Chart
  const chartRef = React.useRef(null);

    chartInst.current = new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [
        {
          label: 'SA', data: projection.map((p) => p.sa),
          borderColor: CPF_COLORS.sa, backgroundColor: 'rgba(212,160,82,0.1)',

        {
          label: 'FRS Target', data: frsLine,
          borderColor: 'rgba(255,255,255,0.2)', backgroundColor: 'transparent',

      },
      options: {
        responsive: true, maintainAspectRatio: false,

        plugins: {
          legend: { display: false },
          tooltip: {
            enabled: false,
            external: (ctx) => {
              const tooltipEl = document.getElementById('cpf-chart-tooltip');

              // Position follows mouse cursor via mousemove listener below

              const label = tooltip.title?.[0] || '';
              const items = tooltip.body?.map((b, i) => {
                const ds = ctx.chart.data.datasets[tooltip.dataPoints[i]?.datasetIndex];

        },

          },

          }

    });

    const onMouseMove = (e) => {

    canvas.addEventListener('mousemove', onMouseMove);
    return () => {

<script type="text/babel">
// ─── SRS Page Component ───────────────────────────────────────────────────────
// Loaded after pages-cpf.jsx; references fmtSGD, todayLong, db, Modal, Field, Input from lib.js / components.jsx

const SRS_COLOR = '#d4a052';
const SRS_YEAR = new Date().getFullYear();

// ── Projection math ───────────────────────────────────────────────────────────
function projectSRS(currentBalance, annualContrib, returnRate, withdrawAge, currentAge) {
  const years = Math.max(withdrawAge - currentAge, 1);
  const r = returnRate / 100;
  const points = [];
  let bal = currentBalance;
  for (let y = 0; y <= years; y++) {
    points.push({ age: currentAge + y, value: Math.round(bal) });
    bal = (bal + annualContrib) * (1 + r);
  }
  return points;
}

// ── SVG line chart ────────────────────────────────────────────────────────────
function SRSChart({ points, conservativePoints, optimisticPoints, withdrawAge }) {
  const W = 320,H = 130,PAD_LEFT = 36;
  const allVals = [...points, ...conservativePoints, ...optimisticPoints].map((p) => p.value);
  const maxVal = Math.max(...allVals, 1);
  const n = points.length;

  function toX(i) {return PAD_LEFT + i / (n - 1) * (W - PAD_LEFT);}
  function toY(v) {return H - v / maxVal * H;}
  function makePath(pts) {
    return pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${toX(i).toFixed(1)},${toY(p.value).toFixed(1)}`).join(' ');
  }
  function makeArea(pts) {
    const line = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${toX(i).toFixed(1)},${toY(p.value).toFixed(1)}`).join(' ');
    return `${line} L${toX(n - 1).toFixed(1)},${H} L${toX(0).toFixed(1)},${H} Z`;
  }

  // Gridlines
  const gridVals = [maxVal * 0.33, maxVal * 0.67, maxVal];
  function fmtK(v) {
    if (v >= 1000000) return `$${(v / 1000000).toFixed(1)}M`;
    if (v >= 1000) return `$${(v / 1000).toFixed(0)}k`;
    return `$${v}`;
  }

  const endVal = points[points.length - 1]?.value || 0;
  const endX = toX(n - 1);
  const endY = toY(endVal);

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H + 14}`} style={{ display: 'block', overflow: 'visible' }}>
      {/* Grid lines */}
      {gridVals.map((v, i) =>
      <g key={i}>
          <line x1={PAD_LEFT} y1={toY(v)} x2={W} y2={toY(v)} stroke="rgba(255,255,255,0.04)" strokeWidth="1" />
          <text x={PAD_LEFT - 3} y={toY(v) + 3} fontSize="8" fill="#6b6057" textAnchor="end">{fmtK(v)}</text>
        </g>
      )}

      {/* Area fill */}
      <path d={makeArea(points)} fill="rgba(212,160,82,0.07)" />

      {/* Conservative line */}
      <path d={makePath(conservativePoints)} fill="none" stroke="rgba(212,160,82,0.3)" strokeWidth="1.5" strokeDasharray="4,3" />

      {/* Optimistic line */}
      <path d={makePath(optimisticPoints)} fill="none" stroke="rgba(212,160,82,0.3)" strokeWidth="1.5" strokeDasharray="4,3" />

      {/* Base line */}
      <path d={makePath(points)} fill="none" stroke={SRS_COLOR} strokeWidth="2" />

      {/* Now label */}
      <line x1={toX(0)} y1={0} x2={toX(0)} y2={H} stroke="rgba(255,255,255,0.04)" strokeWidth="1" />
      <text x={toX(0) + 3} y={H + 11} fontSize="9" fill="#6b6057">Now</text>

      {/* Withdraw age marker */}
      <line x1={endX} y1={0} x2={endX} y2={H} stroke="rgba(212,160,82,0.35)" strokeWidth="1" strokeDasharray="3,3" />
      <text x={endX} y={10} fontSize="9" fill={SRS_COLOR} fontWeight="600" textAnchor="end">Age {withdrawAge}</text>
      <text x={endX} y={endY - 6} fontSize="10" fill={SRS_COLOR} fontWeight="700" textAnchor="end">{fmtK(endVal)}</text>
    </svg>);

}

<script type="text/babel">

// ─── Investments Page ─────────────────────────────────────────────────────────
const PLATFORMS  = ['FSMOne','Syfe','StashAway','Tiger Brokers','IBKR','DBS Vickers','Moomoo','Other'];
const ASSET_TYPES = ['ETF','Stock','REIT','Bond','Fund','Crypto','Other'];
const CURRENCIES = ['USD','SGD','GBP','EUR','HKD','AUD'];
const emptyHolding = { ticker:'', name:'', units:'', avg_cost:'', currency:'USD', asset_type:'ETF', platform:'IBKR', exchange:'' };

function InvestmentsPage() {
  const FX_USD = 1.34;
  const [tick, setTick] = React.useState(0);
  const refresh = () => setTick(t => t + 1);
  const [showModal, setShowModal] = React.useState(false);
  const [editItem, setEditItem] = React.useState(null);
  const [form, setForm] = React.useState(emptyHolding);
  const [saving, setSaving] = React.useState(false);
  const setF = f => e => setForm(p => ({...p, [f]: e.target.value}));

  const holdings = db.get('holdings', []);

  const enriched = holdings.map(h => {
    const price = h.latest_price || h.avg_cost;
    const fxRate = h.currency === 'USD' ? FX_USD : 1;
    const value = h.units * price * fxRate;
    const costBasis = h.units * h.avg_cost * fxRate;
    const pnl = value - costBasis;
    const pnlPct = costBasis ? pnl / costBasis * 100 : 0;
    return { ...h, value, costBasis, pnl, pnlPct };
  });

  const totalValue  = enriched.reduce((s, h) => s + h.value, 0);
  const totalCost   = enriched.reduce((s, h) => s + h.costBasis, 0);
  const totalPnl    = totalValue - totalCost;
  const totalPnlPct = totalCost ? totalPnl / totalCost * 100 : 0;

  function openAdd() { setEditItem(null); setForm(emptyHolding); setShowModal(true); }
  function openEdit(h) {
    setEditItem(h);
    setForm({ ticker: h.ticker, name: h.name||'', units: h.units, avg_cost: h.avg_cost, currency: h.currency||'USD', asset_type: h.asset_type||'ETF', platform: h.platform||'IBKR', exchange: h.exchange||'' });
    setShowModal(true);
  }
  function handleSave(e) {
    e.preventDefault();
    const list = db.get('holdings', []);
    const payload = { ...form, units: parseFloat(form.units), avg_cost: parseFloat(form.avg_cost) };
    if (editItem) {
      db.set('holdings', list.map(h => h.id === editItem.id ? { ...h, ...payload } : h));
    } else {
      list.push({ id: db.nextId('holdings'), ...payload });
      db.set('holdings', list);
    }
    setShowModal(false);
    refresh();
  }
  function handleDelete(id) {
    if (!confirm('Remove this holding?')) return;
    db.set('holdings', db.get('holdings',[]).filter(h => h.id !== id));
    refresh();
  }

  const byType = ASSET_TYPES.filter(t => enriched.some(h => h.asset_type === t));

  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between">
        <h1 style={{fontFamily:"'Lora',Georgia,serif",fontWeight:400,fontSize:'1.5rem',color:'#f0ebe4',letterSpacing:'-0.01em'}}>Investments</h1>
        <button onClick={openAdd} className="btn-primary flex items-center gap-1.5">
          <svg width="12" height="12" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add holding
        </button>
      </div>

      {/* Summary */}
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
        <StatCard title="Portfolio Value" value={fmtSGD(totalValue)} icon={() => <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>} />
        <StatCard title="Cost Basis" value={fmtSGD(totalCost)} />
        <StatCard title="Total P&L" value={`${totalPnl >= 0 ? '+' : ''}${fmtSGD(totalPnl)}`} subValue={`${totalPnlPct >= 0 ? '+' : ''}${totalPnlPct.toFixed(2)}%`}
          className={totalPnl >= 0 ? 'border-emerald-900/40' : 'border-red-900/40'} />
      </div>

      {/* Holdings table */}
      <div className="card overflow-hidden !p-0">
        <div className="px-5 py-4 border-b border-stone-800 flex items-center justify-between">
          <h2 className="text-sm font-semibold text-stone-100">Holdings</h2>
          <span className="text-xs text-stone-500">{holdings.length} position{holdings.length !== 1 ? 's' : ''}</span>
        </div>
        {enriched.length === 0 ? (
          <EmptyState icon={() => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/></svg>}
            title="No holdings yet" description="Add your first investment to track your portfolio." action="Add holding" onAction={openAdd} />
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-xs text-stone-500 uppercase border-b border-stone-800 bg-stone-900/50">
                  <th className="text-left px-5 py-3">Ticker</th>
                  <th className="text-right px-4 py-3">Units</th>
                  <th className="text-right px-4 py-3">Avg Cost</th>
                  <th className="text-right px-4 py-3">Value (SGD)</th>
                  <th className="text-right px-4 py-3">P&L</th>
                  <th className="text-left px-4 py-3 hidden sm:table-cell">Platform</th>
                  <th className="px-4 py-3"></th>
                </tr>
              </thead>
              <tbody className="divide-y divide-stone-800">
                {enriched.map(h => (
                  <tr key={h.id} className="hover:bg-stone-800/30 transition-colors">
                    <td className="px-5 py-3">
                      <p className="font-semibold text-stone-100">{h.ticker}</p>
                      <p className="text-xs text-stone-500">{h.asset_type}{h.exchange ? ` · ${h.exchange}` : ''}</p>
                    </td>
                    <td className="px-4 py-3 text-right text-stone-300 tabular-nums">{fmtNum(h.units, 4)}</td>
                    <td className="px-4 py-3 text-right text-stone-300 tabular-nums">{h.currency} {fmtNum(h.avg_cost, 2)}</td>
                    <td className="px-4 py-3 text-right font-semibold text-stone-100 tabular-nums">{fmtSGD(h.value)}</td>
                    <td className="px-4 py-3 text-right tabular-nums">
                      <p className={`font-medium ${h.pnl >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>{h.pnl >= 0 ? '+' : ''}{h.pnlPct.toFixed(2)}%</p>
                      <p className={`text-xs ${h.pnl >= 0 ? 'text-emerald-600' : 'text-red-600'}`}>{h.pnl >= 0 ? '+' : ''}{fmtSGD(h.pnl)}</p>
                    </td>
                    <td className="px-4 py-3 text-stone-400 text-xs hidden sm:table-cell">{h.platform}</td>
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-3">
                        <button onClick={() => openEdit(h)} className="text-xs text-stone-500 hover:text-stone-200 transition-colors">Edit</button>
                        <button onClick={() => handleDelete(h.id)} className="text-xs text-stone-500 hover:text-red-400 transition-colors">Del</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {/* Attribution */}
      {enriched.length > 0 && (
        <div className="card">
          <h2 className="text-sm font-semibold text-stone-100 mb-4">Portfolio Weights</h2>
          <div className="space-y-3">
            {[...enriched].sort((a,b) => b.value - a.value).map(h => {
              const w = totalValue ? h.value / totalValue * 100 : 0;
              return (
                <div key={h.id}>
                  <div className="flex items-center justify-between text-xs mb-1">
                    <span className="font-medium text-stone-200">{h.ticker}</span>
                    <div className="flex items-center gap-3">
                      <span className="text-stone-400">{w.toFixed(1)}%</span>
                      <span className={`font-medium ${h.pnl >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>{h.pnl >= 0 ? '+' : ''}{h.pnlPct.toFixed(2)}%</span>
                    </div>
                  </div>
                  <div className="h-1.5 bg-stone-800 rounded-full overflow-hidden">
                    <div className={`h-full rounded-full ${h.pnl >= 0 ? 'bg-emerald-500' : 'bg-red-500'}`} style={{ width: `${Math.min(w, 100)}%` }} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Add/Edit Modal */}
      <Modal open={showModal} onClose={() => setShowModal(false)} title={editItem ? 'Edit Holding' : 'Add Holding'}>
        <form onSubmit={handleSave} className="space-y-4">
          <div className="grid grid-cols-2 gap-3">
            <Field label="Ticker *"><Input required value={form.ticker} onChange={setF('ticker')} placeholder="e.g. VWRA" className="uppercase" /></Field>
            <Field label="Name"><Input value={form.name} onChange={setF('name')} placeholder="e.g. Vanguard All-World" /></Field>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Units *"><Input required type="number" step="any" min="0" value={form.units} onChange={setF('units')} placeholder="0" /></Field>
            <Field label="Avg Cost *"><Input required type="number" step="any" min="0" value={form.avg_cost} onChange={setF('avg_cost')} placeholder="0.00" /></Field>
          </div>
          <div className="grid grid-cols-3 gap-3">
            <Field label="Currency"><Select value={form.currency} onChange={setF('currency')}>{CURRENCIES.map(c => <option key={c}>{c}</option>)}</Select></Field>
            <Field label="Type"><Select value={form.asset_type} onChange={setF('asset_type')}>{ASSET_TYPES.map(t => <option key={t}>{t}</option>)}</Select></Field>
            <Field label="Exchange"><Input value={form.exchange} onChange={setF('exchange')} placeholder="e.g. LSE" /></Field>
          </div>
          <Field label="Platform"><Select value={form.platform} onChange={setF('platform')}>{PLATFORMS.map(p => <option key={p}>{p}</option>)}</Select></Field>
          <div className="flex gap-3 pt-2">
            <button type="button" onClick={() => setShowModal(false)} className="flex-1 py-2 rounded-lg border border-stone-700 text-stone-300 text-sm hover:bg-stone-800 transition-colors">Cancel</button>
            <button type="submit" className="flex-1 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium transition-colors">{editItem ? 'Update' : 'Add'}</button>
          </div>
        </form>
      </Modal>
    </div>
  );
}

Object.assign(window, { InvestmentsPage });

</script>

                </div>
              );
            })}

      {/* Add/Edit Modal */}
      <Modal open={showModal} onClose={() => setShowModal(false)} title={editItem ? 'Edit Loan' : 'Add Loan'}>
        <form onSubmit={handleSave} className="space-y-4">
          <div className="grid grid-cols-2 gap-3">
            <Field label="Loan name *"><Input required value={form.loan_name} onChange={setF('loan_name')} placeholder="e.g. HDB Flat" /></Field>
            <Field label="Type"><Select value={form.loan_type} onChange={setF('loan_type')}>{LOAN_TYPES.map(t => <option key={t}>{t}</option>)}</Select></Field>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Original principal *"><Input required type="number" step="any" min="0" value={form.principal} onChange={setF('principal')} placeholder="0.00" /></Field>
            <Field label="Outstanding balance *"><Input required type="number" step="any" min="0" value={form.outstanding_balance} onChange={setF('outstanding_balance')} placeholder="0.00" /></Field>
          </div>
          <div className="grid grid-cols-3 gap-3">
            <Field label="Annual rate (%)"><Input type="number" step="any" min="0" value={form.annual_rate} onChange={setF('annual_rate')} placeholder="2.6" /></Field>
            <Field label="Tenure (months)"><Input type="number" step="1" min="1" value={form.tenure_months} onChange={setF('tenure_months')} placeholder="300" /></Field>
            <Field label="Monthly payment"><Input type="number" step="any" min="0" value={form.monthly_payment} onChange={setF('monthly_payment')} placeholder="Auto" /></Field>
          </div>
          <Field label="Start date"><Input type="date" value={form.start_date} onChange={setF('start_date')} /></Field>
          <div className="flex gap-3 pt-2">

        <div className="space-y-5">
          <div className="grid grid-cols-3 gap-3">
            <Field label="Loan amount (SGD)"><Input type="number" step="any" min="0" value={calc.principal} onChange={setC('principal')} placeholder="500000" /></Field>
            <Field label="Annual rate (%)"><Input type="number" step="any" min="0" value={calc.rate} onChange={setC('rate')} placeholder="2.6" /></Field>
            <Field label="Period (years)"><Input type="number" step="1" min="1" max="35" value={calc.years} onChange={setC('years')} placeholder="25" /></Field>
          </div>
          <button onClick={runCalc} className="w-full py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium transition-colors">Calculate</button>
          {calcRan && (
            <>
              <div className="grid grid-cols-3 gap-3">
                <div className="bg-stone-800 rounded-xl p-4 text-center">

                <div className="bg-stone-800 rounded-xl p-4 text-center">
                  <p className="text-xs text-stone-400 mb-1">Total interest</p>
                  <p className="text-lg font-bold text-red-400">{fmtSGD(totalInterest)}</p>

                <div className="bg-stone-800 rounded-xl p-4 text-center">
                  <p className="text-xs text-stone-400 mb-1">Total repayment</p>
                  <p className="text-lg font-bold text-stone-50">{fmtSGD((parseFloat(calc.principal)||0) + totalInterest)}</p>

              </div>
              <div style={{ height: 180 }}><canvas ref={chartRef}></canvas></div>
              <div>
                <p className="text-xs font-medium text-stone-400 mb-2">First year amortisation</p>
                <div className="overflow-x-auto rounded-lg border border-stone-800">
                  <table className="w-full text-xs">
                    <thead><tr className="bg-stone-800 text-stone-400"><th className="text-right px-3 py-2">Month</th><th className="text-right px-3 py-2">Payment</th><th className="text-right px-3 py-2">Principal</th><th className="text-right px-3 py-2">Interest</th><th className="text-right px-3 py-2">Balance</th></tr></thead>
                    <tbody className="divide-y divide-stone-800">
                      {schedule.slice(0,12).map(r => (
                        <tr key={r.month} className="text-stone-300">
                          <td className="text-right px-3 py-1.5">{r.month}</td>
                          <td className="text-right px-3 py-1.5">{fmtSGD(r.payment)}</td>
                          <td className="text-right px-3 py-1.5 text-emerald-400">{fmtSGD(r.principal)}</td>
                          <td className="text-right px-3 py-1.5 text-red-400">{fmtSGD(r.interest)}</td>

                      ))}

            </>

      </Modal>

}

Object.assign(window, { LoansPage });

</script>
<script type="text/babel">

// ─── Plan Page ────────────────────────────────────────────────────────────────
const PLAN_CATEGORIES = ['Cash', 'Investments', 'CPF', 'Properties'];
const DEFAULT_TARGETS = { Cash: 15, Investments: 50, CPF: 30, Properties: 5 };
const CAT_COLORS = { Cash: 'text-blue-400', Investments: 'text-emerald-400', CPF: 'text-purple-400', Properties: 'text-amber-400' };
const CAT_BG = { Cash: 'bg-blue-500', Investments: 'bg-emerald-500', CPF: 'bg-purple-500', Properties: 'bg-amber-500' };

function PlanPage() {
  const FX_USD = 1.34;
  const profile = db.get('profile', {});
  const initTargets = profile.allocation_targets ? JSON.parse(profile.allocation_targets) : DEFAULT_TARGETS;
  const [targets, setTargets] = React.useState(initTargets);
  const [saved, setSaved] = React.useState(false);

  // Derive actuals
  const cashAccounts = db.get('cash', []);
  const holdings = db.get('holdings', []);
  const cpf = db.get('cpf', { oa:0, sa:0, ma:0, ra:0, srs:0 });

  const totalCash = cashAccounts.reduce((s,a) => s + (a.currency==='USD' ? a.balance*FX_USD : a.balance), 0);
  const totalInv  = holdings.reduce((s,h) => {
    const price = h.latest_price || h.avg_cost;
    const val = h.units * price;
    return s + (h.currency === 'USD' ? val * FX_USD : val);
  }, 0);
  const totalCPF  = (cpf.oa||0) + (cpf.sa||0) + (cpf.ma||0) + (cpf.ra||0) + (cpf.srs||0);

  const actual = { Cash: totalCash, Investments: totalInv, CPF: totalCPF, Properties: 0 };
  const totalActual = Object.values(actual).reduce((s,v) => s+v, 0);
  const gaps = calcAllocationGaps(actual, targets);
  const targetTotal = Object.values(targets).reduce((s,v) => s + (parseFloat(v)||0), 0);

  function setTarget(cat, val) {
    setTargets(t => ({ ...t, [cat]: parseFloat(val) || 0 }));
  }

  function handleSave() {
    const total = Object.values(targets).reduce((s,v) => s + (parseFloat(v)||0), 0);
    if (Math.round(total) !== 100) { alert(`Targets must sum to 100%. Currently ${total.toFixed(1)}%`); return; }
    const p = db.get('profile', {});
    db.set('profile', { ...p, allocation_targets: JSON.stringify(targets) });
    setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  }

  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between">
        <h1 style={{fontFamily:"'Lora',Georgia,serif",fontWeight:400,fontSize:'1.5rem',color:'#f0ebe4',letterSpacing:'-0.01em'}}>Allocation Plan</h1>
        <button onClick={handleSave} disabled={Math.round(targetTotal) !== 100}
          className="btn-primary flex items-center gap-1.5 disabled:opacity-40">
          <svg width="12" height="12" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          {saved ? 'Saved!' : 'Save targets'}
        </button>
      </div>

      {/* Target sliders */}
      <div className="card">
        <div className="flex items-center justify-between mb-5">
          <h2 className="text-sm font-semibold text-stone-100">Target Allocation</h2>
          <span className={`text-xs font-semibold ${Math.round(targetTotal) === 100 ? 'text-emerald-400' : 'text-amber-400'}`}>
            {targetTotal.toFixed(1)}% {Math.round(targetTotal) !== 100 && '— must equal 100%'}
          </span>
        </div>
        <div className="space-y-5">
          {PLAN_CATEGORIES.map(cat => (
            <div key={cat}>
              <div className="flex items-center justify-between mb-1.5">
                <label className={`text-sm font-semibold ${CAT_COLORS[cat]}`}>{cat}</label>
                <div className="flex items-center gap-2">
                  <input type="number" min="0" max="100" step="1"
                    value={targets[cat] ?? 0}
                    onChange={e => setTarget(cat, e.target.value)}
                    className="w-16 bg-stone-800 border border-stone-700 rounded px-2 py-1 text-stone-100 text-xs text-right focus:outline-none focus:ring-1 focus:ring-emerald-500/50" />
                  <span className="text-xs text-stone-500">%</span>
                </div>
              </div>
              <input type="range" min="0" max="100" step="1"
                value={targets[cat] ?? 0}
                onChange={e => setTarget(cat, e.target.value)}
                className="w-full"
                style={{ accentColor: cat === 'Cash' ? '#60a5fa' : cat === 'Investments' ? '#10b981' : cat === 'CPF' ? '#a78bfa' : '#f59e0b' }} />
            </div>
          ))}
        </div>
      </div>

      {/* Actual vs Target */}
      <div className="card">
        <h2 className="text-sm font-semibold text-stone-100 mb-5">Actual vs Target</h2>
        <div className="space-y-5">
          {gaps.map(({ key, actualAmt, actualPct, targetPct, gap }) => (
            <div key={key}>
              <div className="flex items-center justify-between text-xs mb-1.5">
                <span className={`font-semibold ${CAT_COLORS[key]}`}>{key}</span>
                <div className="flex items-center gap-3 text-stone-400">
                  <span className="tabular-nums">{fmtSGD(actualAmt)}</span>
                  <span className={`font-semibold ${gap >= 0 ? 'text-emerald-400' : 'text-amber-400'}`}>
                    {actualPct.toFixed(1)}% {gap > 0 ? `(+${gap}%)` : gap < 0 ? `(${gap}%)` : '✓'}
                  </span>
                  <span className="text-stone-600">target {targetPct}%</span>
                </div>
              </div>
              <div className="relative h-3 bg-stone-800 rounded-full overflow-hidden">
                <div className={`h-full rounded-full ${CAT_BG[key]} opacity-75 transition-all duration-500`}
                  style={{ width: `${Math.min(actualPct, 100)}%` }} />
                <div className="absolute top-0 bottom-0 w-px bg-white/40" style={{ left: `${Math.min(targetPct,100)}%` }} />
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Rebalancing Actions */}
      <div className="card">
        <h2 className="text-sm font-semibold text-stone-100 mb-4">Rebalancing Actions</h2>
        <div className="space-y-2">
          {gaps.filter(g => Math.abs(g.gap) >= 1).sort((a,b) => Math.abs(b.gap)-Math.abs(a.gap)).map(({ key, gap }) => {
            const delta = (gap / 100) * totalActual;
            const action = gap > 0 ? 'Reduce' : 'Increase';
            const isPos = gap > 0;
            return (
              <div key={key} className={`flex items-center justify-between px-4 py-3 rounded-xl ${isPos ? 'bg-amber-400/8 border border-amber-400/20' : 'bg-emerald-400/8 border border-emerald-400/20'}`}>
                <span className={`text-sm font-medium ${isPos ? 'text-amber-300' : 'text-emerald-300'}`}>
                  {action} <strong>{key}</strong> by {Math.abs(gap).toFixed(1)}%
                </span>
                <span className={`text-sm font-bold tabular-nums ${isPos ? 'text-amber-400' : 'text-emerald-400'}`}>
                  {action === 'Reduce' ? '–' : '+'}{fmtSGD(Math.abs(delta))}
                </span>
              </div>
            );
          })}
          {gaps.every(g => Math.abs(g.gap) < 1) && (
            <div className="flex items-center justify-center gap-2 py-6 text-emerald-400">
              <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
              <p className="text-sm font-medium">Portfolio is well-balanced — no actions needed.</p>
            </div>
          )}
        </div>
        <p className="text-xs text-stone-600 mt-4">Targets are set by you. Not financial advice.</p>
      </div>
    </div>
  );
}

Object.assign(window, { PlanPage });

</script>
<script type="text/babel">

// ─── Dividends Page ───────────────────────────────────────────────────────────
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const emptyDiv = { ticker:'', ex_date:'', payment_date:'', amount:'', currency:'SGD', notes:'' };

function DividendsPage() {
  const [tick, setTick] = React.useState(0);
  const refresh = () => setTick(t => t + 1);
  const [showModal, setShowModal] = React.useState(false);
  const [form, setForm] = React.useState(emptyDiv);
  const setF = f => e => setForm(p => ({...p, [f]: e.target.value}));

  const dividends = db.get('dividends', []);
  const holdings = db.get('holdings', []);

  const runRate = calcRunRate(dividends);
  const monthlyAvg = runRate / 12;
  const chartData = buildDividendMonthlyData(dividends);

  const calendarYear = new Date().getFullYear();
  const calendar = MONTHS_SHORT.map((m, i) => ({
    month: m,
    items: dividends.filter(d => { const dt = new Date(d.ex_date); return dt.getFullYear() === calendarYear && dt.getMonth() === i; })
  }));

  function handleSave(e) {
    e.preventDefault();
    const list = db.get('dividends', []);
    list.push({ id: db.nextId('dividends'), ...form, amount: parseFloat(form.amount) });
    db.set('dividends', list);
    setShowModal(false);
    setForm(emptyDiv);
    refresh();
  }
  function handleDelete(id) {
    if (!confirm('Delete this dividend record?')) return;
    db.set('dividends', db.get('dividends',[]).filter(d => d.id !== id));
    refresh();
  }

  // Chart
  const chartRef = React.useRef(null);
  const chartInst = React.useRef(null);
  React.useEffect(() => {
    if (!chartRef.current || !window.Chart) return;
    if (chartInst.current) chartInst.current.destroy();
    chartInst.current = new Chart(chartRef.current, {
      type: 'bar',
      data: {
        labels: chartData.map(d => d.label),
        datasets: [{
          data: chartData.map(d => d.total),
          backgroundColor: chartData.map(d => d.total > 0 ? 'rgba(16,185,129,0.7)' : 'rgba(41,37,36,0.8)'),
          borderColor: chartData.map(d => d.total > 0 ? '#10b981' : '#292524'),
          borderWidth: 1,
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: '#1c1917', borderColor: '#44403c', borderWidth: 1, callbacks: { label: ctx => ` ${fmtSGD(ctx.parsed.y)}` } }
        },
        scales: {
          x: { ticks: { color: '#78716c', font: { size: 10 }, maxRotation: 0 }, grid: { display: false } },
          y: { ticks: { color: '#78716c', font: { size: 10 }, callback: v => `$${v}` }, grid: { color: '#292524' } }
        }
      }
    });
    return () => chartInst.current?.destroy();
  }, [tick]);

  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between">
        <h1 style={{fontFamily:"'Lora',Georgia,serif",fontWeight:400,fontSize:'1.5rem',color:'#f0ebe4',letterSpacing:'-0.01em'}}>Dividends</h1>
        <button onClick={() => setShowModal(true)} className="btn-primary flex items-center gap-1.5">
          <svg width="12" height="12" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add dividend
        </button>
      </div>

      {/* Summary */}
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
        <StatCard title="Passive Income (TTM)" value={fmtSGD(runRate)} icon={() => <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>} />
        <StatCard title="Monthly Average" value={fmtSGD(monthlyAvg)} />
        <StatCard title="Total Records" value={String(dividends.length)} />
      </div>

      {/* Monthly chart */}
      <div className="card">
        <div className="flex items-center justify-between mb-4">
          <h2 className="text-sm font-semibold text-stone-100">Monthly Income (TTM)</h2>
        </div>
        <div style={{ height: 200 }}>
          <canvas ref={chartRef}></canvas>
        </div>
      </div>

      {/* Calendar */}
      <div className="card">
        <h2 className="text-sm font-semibold text-stone-100 mb-4">Dividend Calendar {calendarYear}</h2>
        <div className="grid grid-cols-4 sm:grid-cols-6 gap-2">
          {calendar.map(({ month, items }) => (
            <div key={month} className={`rounded-xl p-3 border transition-colors ${items.length > 0 ? 'bg-emerald-500/8 border-emerald-500/30' : 'bg-stone-800/40 border-stone-800'}`}>
              <p className="text-xs font-semibold text-stone-400 mb-1">{month}</p>
              {items.length === 0 ? <p className="text-xs text-stone-700">—</p> : (
                <div className="space-y-0.5">
                  {items.slice(0,3).map((d,i) => <p key={i} className="text-xs text-emerald-400 font-medium truncate">{d.ticker || 'Div'}</p>)}
                  {items.length > 3 && <p className="text-xs text-stone-500">+{items.length-3}</p>}
                </div>
              )}
            </div>
          ))}
        </div>
      </div>

      {/* History table */}
      <div className="card !p-0 overflow-hidden">
        <div className="px-5 py-4 border-b border-stone-800"><h2 className="text-sm font-semibold text-stone-100">Dividend History</h2></div>
        {dividends.length === 0 ? (
          <EmptyState icon={() => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/></svg>}
            title="No dividends recorded" description="Log dividends received to track passive income." action="Add dividend" onAction={() => setShowModal(true)} />
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-xs text-stone-500 uppercase border-b border-stone-800 bg-stone-900/50">
                  <th className="text-left px-5 py-3">Ticker</th>
                  <th className="text-left px-4 py-3">Ex-date</th>
                  <th className="text-right px-4 py-3">Amount</th>
                  <th className="text-left px-4 py-3 hidden sm:table-cell">Notes</th>
                  <th className="px-4 py-3"></th>
                </tr>
              </thead>
              <tbody className="divide-y divide-stone-800">
                {[...dividends].sort((a,b) => new Date(b.ex_date) - new Date(a.ex_date)).map(d => (
                  <tr key={d.id} className="hover:bg-stone-800/30 transition-colors">
                    <td className="px-5 py-3 font-semibold text-stone-100">{d.ticker || '—'}</td>
                    <td className="px-4 py-3 text-stone-400 tabular-nums">{d.ex_date}</td>
                    <td className="px-4 py-3 text-right font-medium text-emerald-400 tabular-nums">{d.currency} {fmtNum(d.amount, 2)}</td>
                    <td className="px-4 py-3 text-stone-500 text-xs hidden sm:table-cell">{d.notes || '—'}</td>
                    <td className="px-4 py-3"><button onClick={() => handleDelete(d.id)} className="text-xs text-stone-600 hover:text-red-400 transition-colors">Del</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
