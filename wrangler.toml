name = "perfin-api"
main = "worker/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "perfin"
database_id = "REPLACE_WITH_YOUR_D1_ID"

[vars]
FRONTEND_URL = "https://perfin.pages.dev"

[triggers]
crons = ["0 1 * * *"]
